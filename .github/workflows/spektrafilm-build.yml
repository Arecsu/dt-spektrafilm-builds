name: Spektrafilm Builds

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  SOURCE_REPO: Arecsu/darktable
  SOURCE_BRANCH: spektrafilm-draft
  RELEASE_TAG: spektrafilm-builds

jobs:
  # ============================================================
  # Check for new commits on the source branch
  # ============================================================
  check:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.verify.outputs.skip }}
      date_version: ${{ steps.date.outputs.version }}
    steps:
      - name: Set date version
        id: date
        run: echo "version=$(date +%Y%m%d)" >> $GITHUB_OUTPUT
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1
      - name: Fetch source branch tip
        run: git fetch https://github.com/${{ env.SOURCE_REPO }} ${{ env.SOURCE_BRANCH }} --depth=1
      - name: Check for new commits
        id: verify
        run: |
          LAST_BUILT=$(cat last-built.sha 2>/dev/null || echo "none")
          LATEST=$(git rev-parse FETCH_HEAD)
          echo "Last built: $LAST_BUILT"
          echo "Latest:     $LATEST"
          if [ "$LAST_BUILT" = "$LATEST" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  # ============================================================
  # Linux AppImage (x86_64 + ARM64)
  # ============================================================
  AppImage:
    if: needs.check.outputs.skip == 'false'
    needs: [check]
    name: AppImage_${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: X64
            compiler: { compiler: GNU12, CC: gcc-12, CXX: g++-12, packages: gcc-12 g++-12 }
          - os: ubuntu-24.04-arm
            arch: ARM64
            compiler: { compiler: GNU14, CC: gcc-14, CXX: g++-14, packages: gcc-14 g++-14 }
    env:
      CC: ${{ matrix.compiler.CC }}
      CXX: ${{ matrix.compiler.CXX }}
      SRC_DIR: ${{ github.workspace }}/src
      BUILD_DIR: ${{ github.workspace }}/build
      INSTALL_PREFIX: ${{ github.workspace }}/AppDir/usr
      CMAKE_BUILD_TYPE: Release
      GENERATOR: Ninja
    steps:
      - name: Install compiler ${{ matrix.compiler.compiler }}
        run: |
          sudo apt-get update
          sudo apt-get -y install ${{ matrix.compiler.packages }}
      - name: Install Base Dependencies
        run: |
          sudo apt-get -y install \
            build-essential desktop-file-utils gettext git gdb intltool \
            libarchive-dev libatk1.0-dev libcairo2-dev libcolord-dev \
            libcolord-gtk-dev libcups2-dev libcurl4-gnutls-dev \
            libimage-exiftool-perl libfuse2 libgdk-pixbuf2.0-dev \
            libglib2.0-dev libgmic-dev libgraphicsmagick1-dev \
            libgtk-3-dev libinih-dev libjson-glib-dev liblcms2-dev \
            liblensfun-dev liblensfun-bin liblensfun-data-v1 liblensfun1 \
            libosmgpsmap-1.0-dev libpango1.0-dev libpng-dev \
            libportmidi-dev libpotrace-dev libpugixml-dev librsvg2-dev \
            libsaxon-java libsdl2-dev libsecret-1-dev libsqlite3-dev \
            libtiff5-dev libwebp-dev libx11-dev libxml2-dev libxml2-utils \
            ninja-build perl po4a python3-jsonschema xsltproc zlib1g-dev \
            appstream
      - name: Add PPA for multimedia libs (x86_64 only)
        if: runner.arch != 'ARM64'
        run: |
          sudo add-apt-repository -y ppa:savoury1/graphics
          sudo add-apt-repository -y ppa:savoury1/ffmpeg4
          sudo add-apt-repository -y ppa:savoury1/display
          sudo apt-get update
      - name: Install extra dependencies
        run: |
          sudo apt-get -y install \
            aom-tools libaom-dev libavif-dev libgphoto2-dev libde265-dev \
            libimath-dev libjpeg-turbo8-dev libjxl-dev libopenexr-dev \
            libopenh264-dev libopenjp2-7-dev libsharpyuv-dev libx265-dev \
            libwebm-dev x11proto-dev libxfixes-dev
      - name: Build and install libheif
        run: |
          git clone --branch v1.23.1 --depth 1 https://github.com/strukturag/libheif src-libheif
          cd src-libheif
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release -DENABLE_PLUGIN_LOADING=OFF \
            -DWITH_LIBDE265=ON -DWITH_AOM_DECODER=ON -DWITH_AOM_ENCODER=ON \
            -DWITH_OpenH264_DECODER=ON -DWITH_JPEG_DECODER=ON \
            -DWITH_OpenJPEG_DECODER=ON -DWITH_LIBSHARPYUV=ON \
            -DCMAKE_INSTALL_PREFIX=/usr
          ninja -C build
          sudo ninja -C build install
      - name: Build and install exiv2
        run: |
          git clone --branch v0.28.8 --depth 1 https://github.com/Exiv2/exiv2 src-exiv2
          cd src-exiv2
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON -DEXIV2_ENABLE_NLS=ON \
            -DEXIV2_ENABLE_VIDEO=OFF -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build
          sudo cmake --install build
      - name: Checkout source code
        run: |
          git clone -b ${{ env.SOURCE_BRANCH }} \
            https://github.com/${{ env.SOURCE_REPO }} src
          pushd src
          git submodule init
          git config submodule.src/tests/integration.update none
          git submodule update
      - name: Update Lensfun data
        run: sudo lensfun-update-data
      - name: Build AppImage
        run: |
          cd src
          bash tools/appimage-build-script.sh
      - name: Rename AppImage artifact
        run: |
          dt_ver="${{ needs.check.outputs.date_version }}"
          case "${{ runner.arch }}" in
            X64)   arch="x86_64" ;;
            ARM64) arch="aarch64" ;;
          esac
          cd "${{ github.workspace }}/src/build"
          for f in Darktable-*.AppImage; do
            [ -f "$f" ] && mv "$f" "darktable-spektrafilm-${dt_ver}-${arch}.AppImage"
          done
          for f in Darktable-*.AppImage.zsync; do
            [ -f "$f" ] && mv "$f" "darktable-spektrafilm-${dt_ver}-${arch}.AppImage.zsync"
          done
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v7
        with:
          path: ${{ github.workspace }}/src/build/darktable-spektrafilm-*.AppImage*
          name: artifact-appimage-${{ runner.arch }}
          retention-days: 3

  # ============================================================
  # Windows Installer (UCRT64 + CLANGARM64)
  # ============================================================
  Windows:
    if: needs.check.outputs.skip == 'false'
    needs: [check]
    name: Windows_${{ matrix.msystem }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - msystem: UCRT64
            os: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    env:
      SRC_DIR: ${{ github.workspace }}/src
      BUILD_DIR: ${{ github.workspace }}/build
      INSTALL_PREFIX: ${{ github.workspace }}/install
      ECO: -DBINARY_PACKAGE_BUILD=ON
      CMAKE_BUILD_TYPE: Release
      TARGET: skiptest
      GENERATOR: Ninja
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          install: >-
            git intltool po4a
          pacboy: >-
            cc:p cmake:p libxslt:p ninja:p python-jsonschema:p curl:p
            drmingw:p gcc-libs:p gettext:p gmic:p graphicsmagick:p
            gtk3:p icu:p imath:p iso-codes:p lcms2:p lensfun:p
            libavif:p libgphoto2:p libheif:p libjpeg-turbo:p libjxl:p
            libpng:p librsvg:p libsecret:p libtiff:p libwebp:p
            libxml2:p lua54:p omp:p openexr:p openjpeg2:p osm-gps-map:p
            portmidi:p potrace:p pugixml:p SDL2:p sqlite3:p
            webp-pixbuf-loader:p zlib:p
          update: true
      - name: Build and install exiv2
        run: |
          git clone --branch v0.27.7 --depth 1 https://github.com/Exiv2/exiv2 src-exiv2
          cd src-exiv2
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON -DEXIV2_ENABLE_BMFF=ON \
            -DEXIV2_ENABLE_NLS=ON -DEXIV2_ENABLE_VIDEO=OFF \
            -DEXIV2_ENABLE_WIN_UNICODE=ON \
            -DCMAKE_INSTALL_PREFIX=${MINGW_PREFIX}
          cmake --build build
          cmake --install build
      - run: git config --global core.autocrlf input
        shell: bash
      - name: Checkout source code
        run: |
          git clone -b ${{ env.SOURCE_BRANCH }} \
            https://github.com/${{ env.SOURCE_REPO }} src
          cd src
          git submodule init
          git config submodule.src/tests/integration.update none
          git submodule update
      - name: Update Lensfun data
        run: lensfun-update-data
      - name: Build and Install
        run: |
          cmake -E make_directory "${BUILD_DIR}"
          cmake -E make_directory "${INSTALL_PREFIX}"
          $(cygpath ${SRC_DIR})/.ci/ci-script.sh
      - name: Create icon file
        run: |
          pacboy --noconfirm -S --needed imagemagick:p
          magick "${SRC_DIR}"/data/pixmaps/256x256/darktable.png \
            -define icon:auto-resize="256,128,64,48,32,16" \
            "${INSTALL_PREFIX}"/dt_logo_multiresolution.ico
      - name: Create Inno Setup installer
        shell: pwsh
        run: |
          choco upgrade innosetup --no-progress
          cd ${{ env.INSTALL_PREFIX }}
          cp ${{ env.BUILD_DIR }}/darktable.iss ./
          iscc "darktable.iss"
          mv Output/*.exe ${{ env.BUILD_DIR }}/
      - name: Rename Windows artifact
        shell: bash
        run: |
          dt_ver="${{ needs.check.outputs.date_version }}"
          cd "${{ env.BUILD_DIR }}"
          for f in darktable-*.exe; do
            [ -f "$f" ] && mv "$f" "darktable-spektrafilm-${dt_ver}-x86_64.exe"
          done
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          path: ${{ env.BUILD_DIR }}/darktable-spektrafilm-*.exe
          name: artifact-windows-${{ runner.arch }}
          retention-days: 3

  # ============================================================
  # macOS DMG (arm64 + x86_64)
  # ============================================================
  macOS:
    if: needs.check.outputs.skip == 'false'
    needs: [check]
    name: macOS_${{ matrix.build.os }}
    runs-on: ${{ matrix.build.os }}
    strategy:
      fail-fast: false
      matrix:
        build:
          - { os: macos-14,       xcode: 16.2, deployment: 14.0 }
          - { os: macos-15-intel, xcode: 26.3, deployment: 15.0 }
    env:
      DEVELOPER_DIR: /Applications/Xcode_${{ matrix.build.xcode }}.app/Contents/Developer
      CC: cc
      CXX: c++
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.build.deployment }}
      SRC_DIR: ${{ github.workspace }}/src
      BUILD_DIR: ${{ github.workspace }}/src/build
      INSTALL_PREFIX: ${{ github.workspace }}/src/build/macosx
      ECO: -DBINARY_PACKAGE_BUILD=ON -DBUILD_CURVE_TOOLS=ON -DBUILD_NOISE_TOOLS=ON -DUSE_GRAPHICSMAGICK=ON -DUSE_IMAGEMAGICK=OFF
      CMAKE_BUILD_TYPE: Release
      GENERATOR: Ninja
      TARGET: skiptest
    steps:
      - name: Checkout source code
        run: |
          git clone -b ${{ env.SOURCE_BRANCH }} \
            https://github.com/${{ env.SOURCE_REPO }} src
          cd src
          git submodule init
          git config submodule.src/tests/integration.update none
          git submodule update
      - name: Install Base Dependencies
        run: |
          brew update > /dev/null || true
          cd src/.ci
          export HOMEBREW_NO_INSTALL_UPGRADE=1
          brew bundle --verbose || true
          export HOMEBREW_NO_INSTALL_FROM_API=1
          brew developer on
          gm_formula=$(brew edit --quiet --print-path graphicsmagick)
          cat "$gm_formula" | sed 's/--with-modules/--disable-installed/1' > gm_formula.tmp
          mv gm_formula.tmp "$gm_formula"
          brew reinstall --build-from-source --force --quiet graphicsmagick
      - name: Build and Install
        run: |
          cmake -E make_directory "${BUILD_DIR}"
          cmake -E make_directory "${INSTALL_PREFIX}"
          ./src/.ci/ci-script.sh
      - name: Build macOS package
        run: ./src/packaging/macosx/3_make_hb_darktable_package.sh
      - name: Create DMG
        run: ./src/packaging/macosx/4_make_hb_darktable_dmg.sh
      - name: Rename DMG
        run: |
          dt_ver="${{ needs.check.outputs.date_version }}"
          case "${{ runner.arch }}" in
            ARM64) arch="arm64" ;;
            X64)   arch="x86_64" ;;
          esac
          cd "${{ env.INSTALL_PREFIX }}"
          for f in darktable-*.dmg; do
            [ -f "$f" ] && mv "$f" "darktable-spektrafilm-${dt_ver}-${arch}.dmg"
          done
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          path: ${{ env.INSTALL_PREFIX }}/darktable-spektrafilm-*.dmg
          name: artifact-macos-${{ runner.arch }}
          retention-days: 3

  # ============================================================
  # Publish release + auto-update README
  # ============================================================
  publish:
    if: needs.check.outputs.skip == 'false'
    needs: [check, AppImage, Windows, macOS]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - uses: actions/download-artifact@v8
      - name: Get source info
        id: source-info
        run: |
          git fetch https://github.com/${{ env.SOURCE_REPO }} ${{ env.SOURCE_BRANCH }} --tags --depth=100
          SHA=$(git rev-parse FETCH_HEAD)
          echo "COMMIT_SHA=$SHA" >> $GITHUB_ENV
          echo "VERSION=${{ needs.check.outputs.date_version }}" >> $GITHUB_ENV
      - name: Record artifact filenames
        id: artifacts
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          TAG="${{ env.RELEASE_TAG }}"
          BASE="https://github.com/$OWNER/$REPO/releases/download/$TAG"

          for dir in artifact-appimage-X64 artifact-appimage-ARM64 \
                     artifact-windows-X64 \
                     artifact-macos-ARM64 artifact-macos-X64; do
            file=$(ls "$dir" 2>/dev/null | head -1 || true)
            if [ -n "$file" ]; then
              echo "${dir}_FILE=$file" >> $GITHUB_ENV
              echo "${dir}_URL=${BASE}/${file}" >> $GITHUB_ENV
            fi
          done
      - name: Create/Update GitHub Release
        id: release
        uses: ncipollo/release-action@v1.21.0
        with:
          tag: ${{ env.RELEASE_TAG }}
          allowUpdates: true
          removeArtifacts: true
          prerelease: true
          artifactErrorsFailBuild: false
          name: "Spektrafilm build ${{ env.VERSION }}"
          body: |
            Automated build from the [${{ env.SOURCE_BRANCH }}](https://github.com/${{ env.SOURCE_REPO }}/tree/${{ env.SOURCE_BRANCH }}) branch.

            **Version:** ${{ env.VERSION }}
            **Commit:** `${{ env.COMMIT_SHA }}`

            > **⚠️ HIGHLY EXPERIMENTAL** — backup your darktable library (`~/.config/darktable/`) and catalogs before testing. Use `--library <path>` to keep your main setup safe.
          artifacts: |
            artifact-appimage-X64/*
            artifact-appimage-ARM64/*
            artifact-windows-X64/*
            artifact-macos-ARM64/*
            artifact-macos-X64/*
      - name: Update README with download links
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          SRC="${{ env.SOURCE_REPO }}"
          TAG="${{ env.RELEASE_TAG }}"
          BASE="https://github.com/$OWNER/$REPO/releases/download/$TAG"
          V="${{ env.VERSION }}"

          ax64f="${{ env.artifact-appimage-X64_FILE }}"
          aa64f="${{ env.artifact-appimage-ARM64_FILE }}"
          wx64f="${{ env.artifact-windows-X64_FILE }}"
          wa64f=""
          ma64f="${{ env.artifact-macos-ARM64_FILE }}"
          mx64f="${{ env.artifact-macos-X64_FILE }}"

          cat > README.md << READMEEOF
          # Darktable Spektrafilm — Builds

           Automated builds from the [spektrafilm-draft](https://github.com/${SRC}/tree/spektrafilm-draft) branch.

          **Latest version:** ${V}

          ## Required: Film & Print Data Pack

          Download the [spektrafilm-data-pack.zip](https://github.com/${OWNER}/${REPO}/raw/main/spektrafilm-data-pack.zip) and extract to your darktable config dir:

          | Platform | Extract to |
          |----------|-----------|
          | Linux | \`~/.config/darktable/spektrafilm/\` |
          | macOS | \`~/Library/Application Support/darktable/spektrafilm/\` |
          | Windows | \`%APPDATA%\\darktable\\spektrafilm\\\` |

          After extracting you should see \`profiles/\` + \`pack.json\` + \`spectra_lut.f32\` inside.

          ## Latest Builds

          | Platform | Architecture | Download |
          |----------|-------------|----------|
          | Linux AppImage | x86_64 | [${ax64f}](${BASE}/${ax64f}) |
          | Linux AppImage | ARM64 | [${aa64f}](${BASE}/${aa64f}) |
          | Windows | x86_64 | [${wx64f}](${BASE}/${wx64f}) |
          | macOS | ARM64 (Apple Silicon) | [${ma64f}](${BASE}/${ma64f}) |
          | macOS | x86_64 (Intel) | [${mx64f}](${BASE}/${mx64f}) |

          Come work together! Feedback, issues, anything is welcome at [discuss.pixls.us](https://discuss.pixls.us/t/spektrafilm-darktable-module-implementation-discussion/58744)

          > **⚠️ HIGHLY EXPERIMENTAL** — back up your darktable data dir before testing: Linux \`~/.config/darktable/\`, macOS \`~/Library/Application Support/darktable/\`, Windows \`%APPDATA%\\darktable\\\`. Use \`--library <path>\` to keep your main setup safe.
          READMEEOF
      - name: Store last-built commit SHA
        run: |
          echo "${{ env.COMMIT_SHA }}" > last-built.sha
      - name: Commit and push to ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md last-built.sha
          git diff --staged --quiet || git commit -m "Auto-update: build ${{ env.VERSION }}"
          git push
